<div class="login-container">

  <h1>Login</h1>

  <input
    type="email"
    placeholder="Email"
    [(ngModel)]="loginData.email">

  <input
    type="password"
    placeholder="Password"
    [(ngModel)]="loginData.password">

  <button (click)="login()">
    Login
  </button>

  <br><br>

<a routerLink="/register">
  Create Account
</a>

</div>
